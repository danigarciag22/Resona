name: db
on:
  push:
    paths: ['supabase/**', 'package.json', '.github/workflows/db.yml']
  pull_request:
    paths: ['supabase/**', 'package.json', '.github/workflows/db.yml']
jobs:
  pgtap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: supabase/setup-cli@v1
        with: { version: latest }
      - run: supabase start
      - run: supabase test db
      - run: supabase stop
